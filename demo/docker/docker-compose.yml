name: robot-fleet

# Run from repo root:
#   docker compose -f demo/docker/docker-compose.yml up --build
#
# Demo flow — add robots one at a time to show enrollment live:
#   docker compose -f demo/docker/docker-compose.yml up -d device-management-service
#   docker compose -f demo/docker/docker-compose.yml up -d robot-agent-1
#   docker compose -f demo/docker/docker-compose.yml up -d robot-agent-2
#   ...
#
# Watch DMS logs:
#   docker compose -f demo/docker/docker-compose.yml logs -f device-management-service

x-robot-agent: &robot-agent
  build:
    context: ../..
    dockerfile: demo/docker/Dockerfile.robot-agent
  environment: &robot-agent-env
    DEVICE_MODEL:       Alpha Wheeled
    FIRMWARE_VERSION:   "0.1.0"
    AGENT_DATA_DIR:     /data
    PROVISIONING_ADDR:  "https://device-management-service:8445"
    BOOTSTRAP_ADDR:     "https://device-management-service:8444"
    FLEET_SERVICE_ADDR: "https://device-management-service:8443"
    OTA_SERVICE_ADDR:   "https://device-management-service:8443"
    FLEET_CA_CERT_PEM:  /certs/fleet-ca.pem
    RUST_LOG:           "info"
  depends_on:
    - device-management-service

services:
  device-management-service:
    build:
      context: ../..
      dockerfile: demo/docker/Dockerfile.device-management-service
    environment:
      LISTEN_ADDR:        "[::]:8443"
      BOOTSTRAP_ADDR:     "[::]:8444"
      PROVISIONING_ADDR:  "[::]:8445"
      DB_PATH:            /data/fleet.db
      CERT_VALIDITY_DAYS: "30"
      SERVER_CERT_PEM:    /certs/server.pem
      SERVER_KEY_PEM:     /certs/server-key.pem
      FLEET_CA_CERT_PEM:  /certs/fleet-ca.pem
      FLEET_CA_KEY_PEM:   /certs/fleet-ca-key.pem
      DEVICE_CA_CERT_PEM: /certs/device-ca.pem
      DEVICE_CA_KEY_PEM:  /certs/device-ca-key.pem
      # Format: serial:token:model  (model optional, defaults to Alpha Wheeled)
      FACTORY_MANIFEST:   "robot-001:tk-r001:Alpha Wheeled,robot-002:tk-r002:Alpha Wheeled,robot-003:tk-r003:Alpha Wheeled,robot-004:tk-r004:Alpha Wheeled,robot-005:tk-r005:Alpha Wheeled"
      RUST_LOG:           "info"
    volumes:
      - ./../../demo/pki/certs:/certs:ro
      - dms-data:/data
    ports:
      - "8443:8443"
      - "8444:8444"
      - "8445:8445"

  robot-agent-1:
    <<: *robot-agent
    environment:
      <<: *robot-agent-env
      DEVICE_SERIAL:   robot-001
      PROVISION_TOKEN: tk-r001
    volumes:
      - ./../../demo/pki/certs:/certs:ro
      - agent-data-1:/data

  robot-agent-2:
    <<: *robot-agent
    environment:
      <<: *robot-agent-env
      DEVICE_SERIAL:   robot-002
      PROVISION_TOKEN: tk-r002
    volumes:
      - ./../../demo/pki/certs:/certs:ro
      - agent-data-2:/data

  robot-agent-3:
    <<: *robot-agent
    environment:
      <<: *robot-agent-env
      DEVICE_SERIAL:   robot-003
      PROVISION_TOKEN: tk-r003
    volumes:
      - ./../../demo/pki/certs:/certs:ro
      - agent-data-3:/data

  robot-agent-4:
    <<: *robot-agent
    environment:
      <<: *robot-agent-env
      DEVICE_SERIAL:   robot-004
      PROVISION_TOKEN: tk-r004
    volumes:
      - ./../../demo/pki/certs:/certs:ro
      - agent-data-4:/data

  robot-agent-5:
    <<: *robot-agent
    environment:
      <<: *robot-agent-env
      DEVICE_SERIAL:   robot-005
      PROVISION_TOKEN: tk-r005
    volumes:
      - ./../../demo/pki/certs:/certs:ro
      - agent-data-5:/data

volumes:
  dms-data:
  agent-data-1:
  agent-data-2:
  agent-data-3:
  agent-data-4:
  agent-data-5:
